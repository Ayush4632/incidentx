<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Report a cybersecurity incident on IncidentX.">
  <title>Report Incident — IncidentX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" id="main-navbar"></nav>

  <!-- Content -->
  <div class="content-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <!-- Page Header -->
          <div class="page-header animate-fade-in-up">
            <h1>📝 Report an Incident</h1>
            <p class="page-desc">Submit a new cybersecurity incident report</p>
          </div>

          <!-- Alert Messages -->
          <div id="report-error" class="alert alert-danger d-none"></div>
          <div id="report-success" class="alert alert-success d-none"></div>

          <!-- Report Form -->
          <div class="glass-card-static animate-fade-in-up">
            <form id="report-form" novalidate>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="incident-type" class="form-label">Incident Type *</label>
                  <select class="form-select" id="incident-type" required>
                    <option value="">Select type...</option>
                    <option value="Phishing">Phishing</option>
                    <option value="Malware">Malware</option>
                    <option value="Data Breach">Data Breach</option>
                    <option value="Online Fraud">Online Fraud</option>
                  </select>
                  <div class="invalid-feedback">Please select an incident type</div>
                </div>

                <div class="col-md-6 mb-3">
                  <label for="severity" class="form-label">Severity Level *</label>
                  <select class="form-select" id="severity" required>
                    <option value="">Select severity...</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                  </select>
                  <div class="invalid-feedback">Please select a severity level</div>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="reported-date" class="form-label">Date & Time *</label>
                  <input type="datetime-local" class="form-control" id="reported-date" required>
                  <div class="invalid-feedback">Please provide the incident date</div>
                </div>

                <div class="col-md-6 mb-3">
                  <label for="location" class="form-label">Location</label>
                  <input type="text" class="form-control" id="location" placeholder="e.g., Mumbai, India">
                </div>
              </div>

              <div class="mb-4">
                <label for="description" class="form-label">Description *</label>
                <textarea class="form-control" id="description" rows="5" placeholder="Describe the incident in detail (minimum 20 characters)" required minlength="20"></textarea>
                <div class="char-counter" id="char-counter">0 characters (minimum 20)</div>
                <div class="invalid-feedback">Description must be at least 20 characters</div>
              </div>

              <button type="submit" class="btn btn-cyber" id="submit-btn">
                🚀 Submit Report
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/report.js"></script>
</body>
</html>
