<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to IncidentX — Cyber Threat Reporting and Analysis Tool.">
  <title>Login — IncidentX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">🛡️ IncidentX</div>
      <p class="auth-subtitle">Sign in to your account</p>

      <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="login-username" class="form-label">Username</label>
          <input type="text" class="form-control" id="login-username" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="mb-4">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-cyber w-100 mb-3" id="login-btn">
          Login
        </button>

        <p class="text-center" style="color: var(--text-secondary); font-size: 0.9rem;">
          Don't have an account? <a href="/register.html">Register here</a>
        </p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
