<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse reported cybersecurity incidents on IncidentX.">
  <title>Dashboard — IncidentX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" id="main-navbar"></nav>

  <!-- Content -->
  <div class="content-wrapper">
    <div class="container">
      <!-- Page Header -->
      <div class="page-header animate-fade-in-up">
        <h1>Browse Incidents</h1>
        <p class="page-desc">View and search all reported cybersecurity incidents</p>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar animate-fade-in-up">
        <div class="row g-2 align-items-end">
          <div class="col-md-3">
            <label class="form-label">Search</label>
            <input type="text" class="form-control" id="filter-keyword" placeholder="Search by keyword...">
          </div>
          <div class="col-md-2">
            <label class="form-label">Time Range</label>
            <select class="form-select" id="filter-time">
              <option value="all">All Time</option>
              <option value="7d">Last 7 Days</option>
              <option value="30d">Last 30 Days</option>
              <option value="6m">Last 6 Months</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Type</label>
            <select class="form-select" id="filter-type">
              <option value="All">All Types</option>
              <option value="Phishing">Phishing</option>
              <option value="Malware">Malware</option>
              <option value="Data Breach">Data Breach</option>
              <option value="Online Fraud">Online Fraud</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Severity</label>
            <select class="form-select" id="filter-severity">
              <option value="All">All Levels</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
              <option value="Critical">Critical</option>
            </select>
          </div>
          <div class="col-md-3">
            <button class="btn btn-cyber w-100" id="apply-filters">
              🔍 Apply Filters
            </button>
          </div>
        </div>
      </div>

      <!-- Loading State -->
      <div id="loading" class="loading-overlay">
        <div class="cyber-spinner"></div>
      </div>

      <!-- Incidents List -->
      <div id="incidents-list" class="d-none"></div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state d-none">
        <div class="empty-icon">📭</div>
        <p class="empty-text">No incidents found matching your filters.</p>
        <a href="/report.html" class="btn btn-cyber">Report an Incident</a>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="pagination-cyber d-none"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
