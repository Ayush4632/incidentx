<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View detailed information about a cybersecurity incident on IncidentX.">
  <title>Incident Details — IncidentX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" id="main-navbar"></nav>

  <!-- Content -->
  <div class="content-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <!-- Loading State -->
          <div id="loading" class="loading-overlay">
            <div class="cyber-spinner"></div>
          </div>

          <!-- Detail Card -->
          <div id="detail-card" class="d-none animate-fade-in-up">
            <!-- Back Button -->
            <div class="mb-3">
              <a href="javascript:history.back()" class="btn btn-cyber-outline btn-sm">← Back</a>
            </div>

            <!-- Header -->
            <div class="glass-card-static mb-3">
              <div class="detail-header">
                <h1 id="detail-type" style="font-size: 1.5rem; margin: 0;"></h1>
                <div id="detail-badges"></div>
              </div>

              <div class="row">
                <div class="col-md-6">
                  <div class="detail-field">
                    <div class="label">Incident ID</div>
                    <div class="value" id="detail-id"></div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="detail-field">
                    <div class="label">Reported Date</div>
                    <div class="value" id="detail-date"></div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="detail-field">
                    <div class="label">Location</div>
                    <div class="value" id="detail-location"></div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="detail-field">
                    <div class="label">Submitted By</div>
                    <div class="value" id="detail-user"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Description -->
            <div class="glass-card-static mb-3">
              <div class="detail-field">
                <div class="label">Full Description</div>
                <div class="value" id="detail-desc" style="white-space: pre-wrap; line-height: 1.8;"></div>
              </div>
            </div>

            <!-- Timestamps -->
            <div class="glass-card-static">
              <div class="row">
                <div class="col-md-6">
                  <div class="detail-field">
                    <div class="label">Created</div>
                    <div class="value" id="detail-created"></div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="detail-field">
                    <div class="label">Last Updated</div>
                    <div class="value" id="detail-updated"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Error State -->
          <div id="error-state" class="empty-state d-none">
            <div class="empty-icon">❌</div>
            <p class="empty-text">Incident not found.</p>
            <a href="/dashboard.html" class="btn btn-cyber">Back to Dashboard</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/incident-detail.js"></script>
</body>
</html>
