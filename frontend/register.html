<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register for IncidentX — Create your account to report cybersecurity incidents.">
  <title>Register — IncidentX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">🛡️ IncidentX</div>
      <p class="auth-subtitle">Create a new account</p>

      <div id="register-error" class="alert alert-danger d-none" role="alert"></div>
      <div id="register-success" class="alert alert-success d-none" role="alert"></div>

      <form id="register-form" novalidate>
        <div class="mb-3">
          <label for="reg-username" class="form-label">Username</label>
          <input type="text" class="form-control" id="reg-username" placeholder="Choose a username" required minlength="3" maxlength="50">
          <div class="invalid-feedback" id="err-username"></div>
        </div>

        <div class="mb-3">
          <label for="reg-email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="reg-email" placeholder="Enter your email" required>
          <div class="invalid-feedback" id="err-email"></div>
        </div>

        <div class="mb-3">
          <label for="reg-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="reg-password" placeholder="Min 8 chars, letters + numbers" required minlength="8">
          <div class="invalid-feedback" id="err-password"></div>
        </div>

        <div class="mb-4">
          <label for="reg-confirm" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="reg-confirm" placeholder="Re-enter your password" required>
          <div class="invalid-feedback" id="err-confirm"></div>
        </div>

        <button type="submit" class="btn btn-cyber w-100 mb-3" id="register-btn">
          Create Account
        </button>

        <p class="text-center" style="color: var(--text-secondary); font-size: 0.9rem;">
          Already have an account? <a href="/login.html">Login here</a>
        </p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
