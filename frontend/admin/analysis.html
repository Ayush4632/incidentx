<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Threat Analysis Dashboard — View cybersecurity incident analytics and trends.">
  <title>Threat Analysis — IncidentX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" id="main-navbar"></nav>

  <!-- Content -->
  <div class="content-wrapper">
    <div class="container">
      <!-- Page Header -->
      <div class="page-header animate-fade-in-up">
        <h1>📊 Threat Analysis</h1>
        <p class="page-desc">Visual analytics of reported cybersecurity incidents</p>
      </div>

      <!-- Loading -->
      <div id="loading" class="loading-overlay">
        <div class="cyber-spinner"></div>
      </div>

      <!-- Charts -->
      <div id="charts-container" class="d-none">
        <div class="row g-4 mb-4">
          <!-- Doughnut Chart: By Type -->
          <div class="col-lg-6">
            <div class="chart-card animate-fade-in-up">
              <div class="chart-title">🎯 Incidents by Type</div>
              <div style="position: relative; height: 320px;">
                <canvas id="chart-type"></canvas>
              </div>
            </div>
          </div>

          <!-- Bar Chart: By Severity -->
          <div class="col-lg-6">
            <div class="chart-card animate-fade-in-up">
              <div class="chart-title">⚡ Incidents by Severity</div>
              <div style="position: relative; height: 320px;">
                <canvas id="chart-severity"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- Line Chart: Monthly Trend -->
        <div class="row">
          <div class="col-12">
            <div class="chart-card animate-fade-in-up">
              <div class="chart-title">📈 Monthly Incident Trend (Last 6 Months)</div>
              <div style="position: relative; height: 350px;">
                <canvas id="chart-trend"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state d-none">
        <div class="empty-icon">📊</div>
        <p class="empty-text">No data available for analysis yet.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/admin-analysis.js"></script>
</body>
</html>
