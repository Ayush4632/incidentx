<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Dashboard — Manage and review all cybersecurity incidents on IncidentX.">
  <title>Admin Dashboard — IncidentX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" id="main-navbar"></nav>

  <!-- Content -->
  <div class="content-wrapper">
    <div class="container">
      <!-- Page Header -->
      <div class="page-header animate-fade-in-up">
        <h1>⚡ Admin Dashboard</h1>
        <p class="page-desc">Manage, verify, and review all reported incidents</p>
      </div>

      <!-- Stats Cards -->
      <div class="row g-3 mb-4" id="stats-row">
        <div class="col-6 col-md-3">
          <div class="stat-card stat-total animate-fade-in-up">
            <div class="stat-number" id="stat-total">—</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card stat-pending animate-fade-in-up">
            <div class="stat-number" id="stat-pending">—</div>
            <div class="stat-label">Pending</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card stat-verified animate-fade-in-up">
            <div class="stat-number" id="stat-verified">—</div>
            <div class="stat-label">Verified</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card stat-rejected animate-fade-in-up">
            <div class="stat-number" id="stat-rejected">—</div>
            <div class="stat-label">Rejected</div>
          </div>
        </div>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-status="All">All</button>
        <button class="filter-tab" data-status="Pending">Pending</button>
        <button class="filter-tab" data-status="Verified">Verified</button>
        <button class="filter-tab" data-status="Rejected">Rejected</button>
      </div>

      <!-- Loading -->
      <div id="loading" class="loading-overlay d-none">
        <div class="cyber-spinner"></div>
      </div>

      <!-- Incidents Table -->
      <div id="table-container" class="glass-card-static">
        <div class="table-responsive">
          <table class="table table-cyber mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Severity</th>
                <th>Reported By</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="incidents-tbody">
              <tr><td colspan="7" class="text-center py-4" style="color: var(--text-muted);">Loading incidents...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="pagination-cyber d-none"></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">✏️ Edit Incident</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-id">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Incident Type</label>
              <select class="form-select" id="edit-type">
                <option value="Phishing">Phishing</option>
                <option value="Malware">Malware</option>
                <option value="Data Breach">Data Breach</option>
                <option value="Online Fraud">Online Fraud</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Severity</label>
              <select class="form-select" id="edit-severity">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
                <option value="Critical">Critical</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Reported Date</label>
              <input type="datetime-local" class="form-control" id="edit-date">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" id="edit-location">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="edit-description" rows="4"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-cyber-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-cyber" id="save-edit-btn">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">⚠️ Confirm Deletion</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p style="color: var(--text-secondary);">Are you sure you want to delete this incident? This action <strong style="color: var(--status-rejected);">cannot be undone</strong>.</p>
          <input type="hidden" id="delete-id">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-cyber-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger-cyber" id="confirm-delete-btn">Delete Incident</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/admin-dashboard.js"></script>
</body>
</html>
